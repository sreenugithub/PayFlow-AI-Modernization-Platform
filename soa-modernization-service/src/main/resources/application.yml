# soa-modernization-service/src/main/resources/application.yml

server:
  port: 8087

spring:
  application:
    name: soa-modernization-service

  config:
    import: optional:configserver:http://localhost:8888

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info